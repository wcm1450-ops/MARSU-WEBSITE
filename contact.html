<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="聯絡 MARSU - 我們的聯絡方式和表單。">
    <meta property="og:title" content="MARSU - 聯絡我們">
    <meta property="og:description" content="聯絡 MARSU 的方式。">
    <title>MARSU - 聯絡我們</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "聯絡 MARSU",
      "description": "MARSU 聯絡方式"
    }
    </script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">MARSU</div>
                <ul class="nav-menu">
                    <li><a href="index.html">首頁</a></li>
                    <li><a href="about.html">關於我們</a></li>
                    <li><a href="products.html">產品</a></li>
                    <li><a href="services.html">服務</a></li>
                    <li><a href="contact.html" class="active">聯絡我們</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="breadcrumb">
            <div class="container">
                <a href="index.html">首頁</a> / <span>聯絡我們</span>
            </div>
        </section>

        <section class="section contact">
            <div class="container">
                <h1>聯絡我們</h1>
                <p class="lead">我們很樂意聽取您的意見。請通過以下方式與我們聯繫。</p>

                <div class="contact-content">
                    <div class="contact-info">
                        <article id="contact-details" itemscope itemtype="https://schema.org/LocalBusiness">
                            <h2>聯絡信息</h2>
                            
                            <div class="info-item">
                                <h3>地址</h3>
                                <p itemprop="address" itemscope itemtype="https://schema.org/PostalAddress">
                                    <span itemprop="streetAddress">台灣台北市信義區</span><br>
                                    <span itemprop="postalCode">110</span>
                                </p>
                            </div>

                            <div class="info-item">
                                <h3>電話</h3>
                                <p>
                                    <a href="tel:+886212345678" itemprop="telephone">+886 2 1234-5678</a>
                                </p>
                            </div>

                            <div class="info-item">
                                <h3>郵箱</h3>
                                <p>
                                    <a href="mailto:contact@marsu.com" itemprop="email">contact@marsu.com</a>
                                </p>
                            </div>

                            <div class="info-item">
                                <h3>營業時間</h3>
                                <p>
                                    星期一至星期五：09:00 - 18:00<br>
                                    星期六至星期日：休息
                                </p>
                            </div>
                        </article>
                    </div>

                    <div class="contact-form">
                        <h2>聯絡表單</h2>
                        <form action="#" method="post" id="contact-form">
                            <div class="form-group">
                                <label for="name">姓名 *</label>
                                <input type="text" id="name" name="name" required>
                            </div>

                            <div class="form-group">
                                <label for="email">郵箱 *</label>
                                <input type="email" id="email" name="email" required>
                            </div>

                            <div class="form-group">
                                <label for="phone">電話</label>
                                <input type="tel" id="phone" name="phone">
                            </div>

                            <div class="form-group">
                                <label for="subject">主題 *</label>
                                <input type="text" id="subject" name="subject" required>
                            </div>

                            <div class="form-group">
                                <label for="message">信息 *</label>
                                <textarea id="message" name="message" rows="5" required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary">發送信息</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>公司</h4>
                    <ul>
                        <li><a href="about.html">關於我們</a></li>
                        <li><a href="careers.html">招聘信息</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>產品與服務</h4>
                    <ul>
                        <li><a href="products.html">產品</a></li>
                        <li><a href="services.html">服務</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>聯絡</h4>
                    <ul>
                        <li><a href="contact.html">聯絡我們</a></li>
                        <li><a href="mailto:contact@marsu.com">發送郵件</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 MARSU. 版權所有。</p>
            </div>
        </div>
    </footer>
</body>
</html>
